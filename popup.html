<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: "Google Sans", Roboto, system-ui, sans-serif;
        width: 300px;
        margin: 0;
        padding: 14px;
        color: #202124;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      #status {
        font-size: 13px;
        margin: 0 0 12px;
        color: #5f6368;
        min-height: 18px;
      }
      button {
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      #stop { background: #d93025; color: #fff; }
      #stop:disabled { background: #e8eaed; color: #9aa0a6; cursor: default; }
      #savekey { background: #1a73e8; color: #fff; }
      .hint { font-size: 12px; color: #80868b; margin: 10px 0 0; }
      hr { border: 0; border-top: 1px solid #eceff1; margin: 14px 0 10px; }
      .ghdr { display: block; font-size: 13px; font-weight: 500; margin: 0 0 6px; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #dadce0;
        border-radius: 6px;
        font-size: 13px;
        margin: 0 0 8px;
      }
      .loghdr { display: flex; align-items: center; justify-content: space-between; margin: 0 0 6px; }
      .loghdr .ghdr { margin: 0; }
      #clearlog {
        width: auto; padding: 3px 8px; font-size: 11px;
        background: #f1f3f4; color: #5f6368; border-radius: 4px;
      }
      #log {
        max-height: 180px; overflow-y: auto;
        border: 1px solid #eceff1; border-radius: 6px;
        padding: 6px; font-size: 11px; line-height: 1.45;
        background: #fafafa;
      }
      #log .empty { color: #9aa0a6; }
      #log .row { padding: 2px 0; border-bottom: 1px solid #f1f3f4; white-space: normal; word-break: break-word; }
      #log .row:last-child { border-bottom: 0; }
      #log .t { color: #9aa0a6; }
      #log .row.warn { color: #b06000; }
      #log .row.error { color: #c5221f; }
    </style>
  </head>
  <body>
    <h1>Запис Meet → Drive</h1>
    <p id="status">—</p>
    <button id="stop" disabled>■ Зупинити запис</button>
    <p class="hint">Старт — кнопкою «● Запис» у вікні Meet.</p>

    <hr />
    <label class="ghdr" for="gkey">Gemini API-ключ (авто-конспект)</label>
    <input id="gkey" type="password" placeholder="Вставте ключ і натисніть «Зберегти»" autocomplete="off" />
    <button id="savekey">Зберегти ключ</button>
    <p id="keystate" class="hint"></p>
    <button id="redo" style="margin-top:8px;background:#f1f3f4;color:#202124" disabled>↻ Повторити останній конспект</button>
    <p id="redohint" class="hint"></p>

    <hr />
    <div class="loghdr">
      <span class="ghdr">Історія</span>
      <button id="clearlog">Очистити</button>
    </div>
    <div id="log"><span class="empty">Поки що порожньо.</span></div>

    <script src="popup.js"></script>
  </body>
</html>
