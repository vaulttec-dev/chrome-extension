# SonarQube scanner config. Server/onboarding: eloicompany/sonarqube-selfhosted repo.
sonar.projectKey=chrome-extension
sonar.sources=.
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/vendor/**,\
  **/*.min.js,\
  **/*.lock
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/tests/**
